meta:
  candidate_discovery:
    enabled: true
    propose_for:
      d_tags: true
      j_tags: true
      p_tags: true
    surfacing_rules:
      candidate_lifecycle:
        rules:
        - approved_only_used_for_tagging
        - rejected_deleted_and_suppressed
        - flagged_retained_but_inert
        states:
        - proposed
        - flagged
        - approved
        - rejected
      candidate_phrase_mining:
        max_ngram: 4
        min_ngram: 2
        min_occurrences_in_doc: 2
      scoring_hints:
        d_candidate_if:
        - appears_in_heading_or_list_label
        - high_frequency_in_section
        j_candidate_if:
        - capitalized_entity_like
        - 'appears_near_words: [''program'',''state'',''department'',''agency'',''services'']'
        p_candidate_if:
        - verb_like
        - appears_in_imperative_or_modal_context
      unique_terms:
        exclude_numeric_only: true
        min_occurrences_in_doc: 3
        min_token_length: 3
  lexicon_meta:
    approved_at: '2026-02-08'
    lexicon_version: v1.0.0
    maintained_externally: true
    notes:
    - p-tags = procedural intent (what can be done with the statement)
    - 'd-tags = domain/topic (provider manual sections: claims, pharmacy, eligibility,
      compliance...)'
    - j-tags = jurisdiction/scope (payor, program, state, regulator)
    source_documents:
    - Sunshine Health Provider Manual (2025)
    taxonomy:
      d_roots:
      - claims
      - pharmacy
      - eligibility
      - utilization_management
      - compliance
      - responsibilities
      - contact_information
      - tools
      - appropriate_services
      - managed_care
      - medicaid_managed_care
      - provider_network
      - behavioral_health_satisfaction_assessment
      - provider_responsibilities
      - provider_relations
      - linguistically_appropriate
      - health_care_services
      - provider_services
      - provider_manual
      - quality_program
      - credentialing
      - quality_porgram
      - biling_codes
      defaults:
        d_root: claims
        j_root: state
      j_roots:
      - state
      - program
      - payor
      - provider
      - regulatory_authority
      rules:
        d_forbidden_roots:
        - state
        - program
        - payor
        - provider
        - regulatory_authority
        d_strip_prefixes:
        - provider.
  lexicon_version: v1.0.0
  matching_engine_contract:
    disambiguation:
      acronym_policy:
        description: Acronyms like 'PA' require domain context from heading_cues or
          co-occurring keywords.
        gated_acronyms:
          pa:
            otherwise: treat_as_ambiguous_candidate
            requires_any_d_tag_root:
            - pharmacy
            - utilization_management
      negative_keyword_policy:
        description: If any negative keyword hits, the tag is suppressed unless there
          is strong_phrase match.
        strong_overrides_negative: true
      priority_order:
        d_tags_roots:
        - provider.claims
        - provider.pharmacy
        - provider.eligibility
        - provider.utilization_management
        - provider.compliance
        - provider.responsibilities
        j_tags:
        - payor.sunshine_health
        - program.medicaid
        - state.florida
        - regulatory_authority.cms
        - regulatory_authority.ahca
        - regulatory_authority.oig
        - regulatory_authority.hhs
        - regulatory_authority.dcf
        p_tags:
        - prohibited_action
        - required_action
        - appeal
        - resubmit
        - submit
        - verify
        - check_status
        - call
        - email
        - contact
        - review
    thresholds:
      candidate_if_between:
      - 0.55
      - 0.75
      reject_below: 0.55
      strong_accept: 0.9
      weak_accept: 0.75
    tiers:
    - confidence: 0.95
      description: Exact phrase/alias match (after normalization)
      name: strong_phrase
    - confidence: 0.85
      description: Heading path or section title implies tag
      name: heading_cue
    - confidence: 0.85
      description: Regex pattern match (e.g., phone/email/forms)
      name: regex_pattern
    - confidence: 0.7
      description: Keyword cluster; requires >= min_keyword_hits and no negative hits
      name: weak_keywords
  normalization:
    collapse_whitespace: true
    link_text_behavior: keep_label_and_url
    lowercase: true
    preserve_acronyms: true
    preserve_hyphens_in_tokens: true
    protected_terms:
    - cms-1500
    - ub-04
    - hipaa
    - ahca
    - cms
    - oig
    - edi
    - pdl
    - ivr
    - medicaid
    - medicare
    stopwords:
    - the
    - a
    - an
    - and
    - or
    - of
    - to
    - for
    - in
    - 'on'
    - by
    - with
    - section
    - chapter
    - table
    - figure
    - appendix
    strip_punctuation: true
  outputs:
    tag_payload_fields:
    - tag_code
    - tag_kind
    - match_tier
    - matched_text
    - match_score
    - evidence_spans
    - negatives_hit
    - heading_path_used
  revision: 275
