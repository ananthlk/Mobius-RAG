# =============================================================================
# OPEN GAPS  ->  each produces one work-order signal (spec §6)
# =============================================================================
gaps:
  corpus_untagged:
    severity: high
    to: rag_agent            # RAG agent confirmed 2026-07-03; owns this fix
    description: |
      3 Aetna docs have payer=NULL/state=NULL/program=NULL — direct file uploads
      skip the scraper's hostname-inference path, so the ("aetna better
      health","FL","Medicaid") rule never fired. Filter returns 0 because
      publish.py freezes _str_or_empty(doc.payer)="" into document_payer at
      publish time (retag/Path B does NOT touch payer — lexicon topics only).
    fix_pipeline:                # per doc; NO bulk payer-classification endpoint
      - "PATCH /documents/{id}  -> payer='Aetna' (NOT 'Aetna Better Health' — must match j:payor.aetna), state='FL', program='Medicaid'"
      - "POST  /documents/{id}/publish  -> re-freezes document_payer into rag_published_embeddings rows"
    naming_note: |
      CORRECTION to earlier instruction: canonical is 'Aetna', not 'Aetna Better
      Health'. If the 3 docs were already PATCHed to 'Aetna Better Health', they
      need re-PATCH to 'Aetna' + re-publish, else the j:payor.aetna tag filter and
      the structured payer filter disagree.
    docs: [abhfl_medicaid_comprehensive_ltc_provider_manual.pdf, abhfl_medicaid_ltc_member_handbook.pdf, "Aetna_Better_Health_of_Florida__Inc..pdf"]
  inc_pdf_no_text:
    severity: medium
    to: rag_agent
    description: |
      'Aetna_Better_Health_of_Florida__Inc..pdf' extracted only its cover text
      layer (1 short chunk across 32 hits) — an OCR-only PDF that fooled the
      extractor. extraction_status='completed' so the content-less gate passes
      it. RAG agent to flag needs_ocr (gate should check chunk_count/text_len,
      not just extraction_status).
  # NOTE: the document_name=None seen in the pgvector admin probe is COSMETIC —
  # the model stores document_filename/document_display_name, not document_name;
  # the probe field maps to no column. Embeddings + text are intact. No fix.
  mma_member_handbook_missing:
    severity: medium
    to: rag_curator
    description: "Only the LTC member handbook is in corpus; locate + ingest the MMA member handbook."
  medical_policies_missing:
    severity: medium
    to: rag_curator
    description: "Ingest FL-applicable Aetna Clinical Policy Bulletins."
  pa_list_missing:
    severity: medium
    to: rag_curator
    description: "Ingest the ABHFL prior-authorization requirements list (currently website-only)."
  sitemap_seed:
    severity: medium
    to: rag_curator
    description: "Seed sitemap_data_v0.json with aetnabetterhealth.com/florida crawl."
  appeals_address_verify:
    severity: low
    to: human
    description: "Confirm current Grievance & Appeals PO Box (an address-change bulletin exists)."
  surface_values_confirm:
    severity: low
    to: human
    description: "Confirm all surface phone/fax values against the official Quick Reference Guide PDF (aetna.com blocks automated fetch)."
