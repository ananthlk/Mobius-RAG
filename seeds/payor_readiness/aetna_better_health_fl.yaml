# =============================================================================
# Payor Readiness Catalogue — Aetna Better Health of Florida (Medicaid)
# =============================================================================
# This is the human-reviewable source of truth for one payor. A loader upserts
# each `asset` / `api` entry into the Postgres tables payor_readiness_asset /
# payor_api_capability (see docs/payor-readiness-registry-spec.md).
#
# Status legend (asset.status):
#   present | partial | missing | stale | out_of_compliance | needs_auth | n_a
# verified_via:  rag_probe | web | human
# confidence:    high | medium | low
# -----------------------------------------------------------------------------
# Refresh cadence:  corpus=quarterly, surface=180d (see per-asset ttl_days)
# Last assessed:    2026-07-03  (rag_probe against :8001 + web validation)
# Assessed by:      payor-platform-agent
# -----------------------------------------------------------------------------

payor:
  # Canonical MUST match the stack's payor key, NOT the marketing name.
  # Authoritative sources agree on "Aetna": lexicon j-tag j:payor.aetna
  # (corpus_search.py:941), curator classifier aetnabetterhealth.com→("Aetna","FL")
  # (app/curator/classifier.py), metadata_canonical["aetna"]="Aetna". The plan
  # "Aetna Better Health of Florida" is identified by the (payor,state,program)
  # TRIPLE — payer alone is ambiguous (aetna.com commercial also → "Aetna").
  canonical: "Aetna"
  j_tag: "j:payor.aetna"
  display_name: "Aetna Better Health of Florida"   # human label only, not the key
  parent: "Aetna / CVS Health"
  state: FL
  program: Medicaid
  plan_lines:
    - medicaid_managed_care_mma
    - comprehensive_long_term_care_ltc
  notes: |
    Rows below reflect the MMA/Comprehensive LTC line. A 2026-07-03 assessment
    found 3 Aetna docs already in the RAG corpus but UNTAGGED (payer=NULL), so
    filtered retrieval returned 0 — see gaps.corpus_untagged.

# =============================================================================
# CORPUS ASSETS — must be ingested + queryable in RAG
# =============================================================================
assets:

  - asset_type: provider_manual
    layer: corpus
    required: true
    status: present            # in corpus, but see gap: needs payer tag
    label: "ABHFL 2025 Provider Manual (MMA + Comprehensive LTC)"
    source_url: "https://www.aetnabetterhealth.com/content/dam/aetna/medicaid/florida/provider/pdf/abhfl_medicaid_comprehensive_ltc_provider_manual.pdf"
    retrieved_from: "abhfl_medicaid_comprehensive_ltc_provider_manual.pdf"
    verified_via: rag_probe
    confidence: high
    ttl_days: 365
    last_verified_at: 2026-07-03
    probe_question: "Aetna Better Health of Florida provider manual"
    must_facts:
      - "Aetna Better Health of Florida"
      - "2025 Provider Manual"
    gap: "COVERAGE_UNTAGGED — corpus doc has payer=NULL; retag payer='Aetna Better Health', state=FL."

  - asset_type: member_handbook
    layer: corpus
    required: true
    status: partial
    label: "ABHFL LTC Member Handbook"
    source_url: null            # confirm canonical URL
    retrieved_from: "abhfl_medicaid_ltc_member_handbook.pdf"
    verified_via: rag_probe
    confidence: medium
    ttl_days: 365
    last_verified_at: 2026-07-03
    probe_question: "Aetna Better Health Florida member handbook covered benefits"
    must_facts:
      - "Aetna Better Health of Florida"
      - "member handbook"
    gap: "MMA member handbook not confirmed in corpus — only the LTC handbook present."

  - asset_type: medical_policies
    layer: corpus
    required: true
    status: missing
    label: "Aetna Clinical Policy Bulletins (FL Medicaid applicability)"
    source_url: null
    verified_via: rag_probe
    confidence: high
    ttl_days: 90
    last_verified_at: 2026-07-03
    probe_question: "Aetna Better Health Florida clinical medical policy medical necessity"
    must_facts:
      - "Aetna"
      - "medical necessity"
    gap: "No distinct medical-policy doc in corpus. Aetna uses Clinical Policy Bulletins (CPBs) — locate FL-applicable set."

  - asset_type: um_policies
    layer: corpus
    required: true
    status: missing
    label: "ABHFL prior-authorization requirements / UM criteria"
    source_url: "https://www.aetnabetterhealth.com/florida/providers/prior-authorization.html"
    verified_via: web
    confidence: medium
    ttl_days: 90
    last_verified_at: 2026-07-03
    probe_question: "Aetna Better Health Florida services requiring prior authorization"
    must_facts:
      - "prior authorization"
      - "Aetna Better Health of Florida"
    gap: "PA requirements live on the website + PA forms; not ingested as a corpus doc. Ingest the PA list."

  - asset_type: billing_manual
    layer: corpus
    required: true
    status: partial
    label: "ABHFL Billing & Claims Processing training"
    source_url: "https://www.aetnabetterhealth.com/content/dam/aetna/medicaid/florida/provider/pdf/abhfl_claims_training_powerpoint.pdf"
    verified_via: web
    confidence: medium
    ttl_days: 180
    last_verified_at: 2026-07-03
    probe_question: "Aetna Better Health Florida billing claims submission EDI"
    must_facts:
      - "claims"
      - "Aetna Better Health of Florida"
    gap: "Only a claims-training deck located, not a formal EDI companion guide. Confirm/ingest."

  - asset_type: fee_schedule
    layer: corpus
    required: false
    status: missing
    ttl_days: 90
    last_verified_at: 2026-07-03
    probe_question: "Aetna Better Health Florida Medicaid fee schedule reimbursement rates"
    gap: "No fee schedule in corpus. Ties to DOGE FL Medicaid rate work."

